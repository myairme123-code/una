<!DOCTYPE html>
<html>
<head>
  <title>Anniversary Card ❤️</title>

  <style>
    body {
      margin: 0;
      background: #111;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: Arial;
    }

    .card {
      width: 500px;
      height: 320px;
      position: relative;
      perspective: 2000px;
      cursor: pointer;
      transition: transform 1s ease;
    }

    .card.open {
      transform: translateX(125px);
    }

    .inside {
      position: absolute;
      width: 100%;
      height: 100%;
      display: flex;
      opacity: 0;
      transition: opacity 0.5s ease 0.3s;
    }

    .card.open .inside {
      opacity: 1;
    }

    .left, .right {
      width: 50%;
      height: 100%;
    }

    /* Clean white background, no lines */
    .left {
      background: white;
      padding: 20px;
      box-sizing: border-box;
      color: #000;
      font-size: 14px;
      line-height: 25px;
    }

    .right {
      /* empty */
    }

    .cover {
      position: absolute;
      width: 50%;
      height: 100%;
      left: 0;
      transform-style: preserve-3d;
      transform-origin: left;
      transition: transform 1s ease;
      z-index: 2;
    }

    .card.open .cover {
      transform: rotateY(-180deg);
    }

    .face {
      position: absolute;
      width: 100%;
      height: 100%;
      backface-visibility: hidden;
    }

    .front {
      background: #ff4d6d;
      display: flex;
      justify-content: center;
      align-items: center;
      color: white;
      font-size: 24px;
    }

    .back {
      transform: rotateY(180deg);
    }

    .back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
  </style>
</head>

<body>

<div class="card" onclick="toggleCard(this)">

  <div class="inside">
    <div class="left">
      Happy 1 year.<br><br>
      From everything we've been through,<br>
      I'm really glad it's you.<br><br>
      I’d still choose you again and again ❤️
    </div>
    <div class="right"></div>
  </div>

  <div class="cover">
    <div class="face front">
      Happy 1 Year ❤️
    </div>
    <div class="face back">
      <img src="img1.jpg">
    </div>
  </div>

</div>

<audio id="bgmusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<script>
let isOpen = false;
function toggleCard(card) {
  card.classList.toggle("open");
  const music = document.getElementById("bgmusic");
  if (!isOpen) {
    music.currentTime = 0;
    music.play();
  } else {
    music.pause();
  }
  isOpen = !isOpen;
}
</script>

</body>
</html>
